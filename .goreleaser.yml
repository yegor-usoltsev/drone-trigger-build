---
version: 2

project_name: drone-trigger-build

before:
  hooks:
    - go mod tidy

builds:
  - id: drone-trigger-build
    env:
      - CGO_ENABLED=0
    targets:
      - go_first_class
    flags:
      - -trimpath
    ldflags:
      - -s -w

changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge "

archives:
  - format_overrides:
      - goos: windows
        formats: zip

checksum:
  name_template: checksums.sha256.txt
  algorithm: sha256

report_sizes: true

dockers_v2:
  - id: drone-trigger-build-image
    dockerfile: Dockerfile
    ids:
      - drone-trigger-build
    images:
      - yusoltsev/drone-trigger-build
      - ghcr.io/yegor-usoltsev/drone-trigger-build
    tags:
      - "v{{ .Version }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - "v{{ .Major }}"
      - "latest"
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.description: "Trigger Drone builds across repositories from CI or automation"
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.version: "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64

release:
  github:
    owner: yegor-usoltsev
    name: drone-trigger-build
  name_template: "v{{ .Version }}"
  footer: |
    ## Docker images

    Docker Hub:
    - `yusoltsev/drone-trigger-build:v{{ .Version }}`
    - `yusoltsev/drone-trigger-build:v{{ .Major }}.{{ .Minor }}`
    - `yusoltsev/drone-trigger-build:v{{ .Major }}`
    - `yusoltsev/drone-trigger-build:latest`

    GHCR:
    - `ghcr.io/yegor-usoltsev/drone-trigger-build:v{{ .Version }}`
    - `ghcr.io/yegor-usoltsev/drone-trigger-build:v{{ .Major }}.{{ .Minor }}`
    - `ghcr.io/yegor-usoltsev/drone-trigger-build:v{{ .Major }}`
    - `ghcr.io/yegor-usoltsev/drone-trigger-build:latest`
